name: Publish Flatpak

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build-oci:
    name: Build Flatpak OCI
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-50
      options: --privileged
    steps:
      - uses: actions/checkout@v4
      - name: Setup suite-common subproject
        run: |
          mkdir -p subprojects
          git clone --depth 1 https://github.com/hanthor/suite-common.git subprojects/suite-common
      - name: Build Flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          manifest-path: io.github.hanthor.tables.json
          cache-key: flatpak-builder-${{ github.sha }}
          build-bundle: false
          upload-artifact: false
      - name: Export OCI
        run: |
          flatpak build-bundle --oci --arch=x86_64 repo tables.oci io.github.hanthor.tables
      - name: Upload OCI artifact
        uses: actions/upload-artifact@v4
        with:
          name: tables-oci
          path: tables.oci/
          retention-days: 1

  publish:
    name: Publish to GHCR + update index
    needs: build-oci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: tables-oci
          path: tables.oci
      - name: Push OCI to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | skopeo login ghcr.io -u "${{ github.actor }}" --password-stdin
          skopeo copy oci:tables.oci docker://ghcr.io/${{ github.repository_owner }}/tables:latest
          TAG="${{ github.ref_name }}"
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            skopeo copy oci:tables.oci docker://ghcr.io/${{ github.repository_owner }}/tables:${TAG}
          fi
      - name: Clone flatpak-index
        run: |
          git clone --depth 1 https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository_owner }}/flatpak-index.git index-repo
      - name: Update index
        run: |
          mkdir -p index-repo/index/static
          # Copy OCI to index
          cp -r tables.oci/* index-repo/index/static/ 2>/dev/null || true
          # Generate appstream data if available
          echo "Updated tables OCI at $(date)" > index-repo/index/tables-version.txt
      - name: Commit and push index
        run: |
          cd index-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to index"
          else
            git commit -m "chore: update tables Flatpak OCI [${{ github.ref_name }}]"
            git push origin main
          fi
      - name: Trigger gh-pages deploy
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository_owner }}/flatpak-index/pages/builds"
